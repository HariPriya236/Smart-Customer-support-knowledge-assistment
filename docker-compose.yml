version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: supportiq_postgres
    restart: always
    environment:
      POSTGRES_DB: supportiq_db
      POSTGRES_USER: supportiq_user
      POSTGRES_PASSWORD: supportiq_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportiq_user -d supportiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supportiq_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://supportiq_user:supportiq_password@postgres:5432/supportiq_db
      - VECTOR_DB_TYPE=chroma
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - DEFAULT_LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supportiq_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
